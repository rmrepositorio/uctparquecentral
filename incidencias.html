<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Incidencias — Control Tráfico</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

:root {
  --bg:#08080f; --bg2:#0e0e1a; --bg3:#141424; --bg4:#1a1a2e;
  --accent:#00e5b0; --accent-dim:rgba(0,229,176,.12); --accent2:#c084fc;
  --danger:#ff4d6d; --text:#f0f0ff;
  --muted:#525270; --muted2:#3a3a55;
  --border:rgba(255,255,255,.06); --border2:rgba(255,255,255,.1);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh;
  background-image:radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,229,176,.07) 0%, transparent 60%);}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:200;background:rgba(8,8,15,.9);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border2);padding:0 24px;display:flex;align-items:center;gap:16px;height:56px;}
.topbar-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.05em;color:var(--accent);letter-spacing:2px;text-decoration:none;}
.topbar-sep{color:var(--muted2);font-size:1.2em;}
.topbar-title{font-family:'Syne',sans-serif;font-weight:600;font-size:.95em;color:var(--text);}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.chip{font-family:'DM Mono',monospace;font-size:.7em;background:var(--accent-dim);color:var(--accent);
  border:1px solid rgba(0,229,176,.25);border-radius:20px;padding:3px 10px;white-space:nowrap;}
.btn-nav{font-size:.75em;color:var(--muted);border:1px solid var(--border2);background:transparent;
  border-radius:6px;padding:5px 12px;cursor:pointer;text-decoration:none;transition:all .2s;white-space:nowrap;}
.btn-nav:hover{color:var(--accent);border-color:var(--accent);}

/* ── FILTROS ── */
.filtros-wrap{padding:16px 24px 0;display:flex;flex-direction:column;gap:10px;}
.filtros-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.search-box{position:relative;flex:1;min-width:180px;max-width:300px;}
.search-box input{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);
  border-radius:8px;padding:8px 12px 8px 34px;font-family:'DM Sans',sans-serif;font-size:.82em;outline:none;transition:border-color .2s;}
.search-box input:focus{border-color:var(--accent);}
.search-box input::placeholder{color:var(--muted);}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.85em;pointer-events:none;}

/* ── MULTI-SELECT DROPDOWN ── */
.ms-wrap{position:relative;}
.ms-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--bg3);border:1px solid var(--border2);color:var(--text);
  border-radius:8px;padding:7px 10px;font-family:'DM Sans',sans-serif;
  font-size:.82em;cursor:pointer;transition:all .2s;white-space:nowrap;
  min-width:130px;justify-content:space-between;user-select:none;
}
.ms-btn:hover,.ms-btn.open{border-color:var(--accent);color:var(--accent);}
.ms-btn-label{overflow:hidden;text-overflow:ellipsis;max-width:140px;}
.ms-btn-arrow{font-size:.65em;opacity:.6;flex-shrink:0;}
.ms-count{background:var(--accent);color:var(--bg);border-radius:10px;
  padding:1px 6px;font-size:.68em;font-weight:700;font-family:'DM Mono',monospace;flex-shrink:0;}

.ms-dropdown{
  position:fixed;z-index:9999;
  background:var(--bg2);border:1px solid var(--border2);border-radius:10px;
  box-shadow:0 12px 40px rgba(0,0,0,.7);
  min-width:200px;max-width:280px;
  display:none;flex-direction:column;
  overflow:hidden;
}
.ms-dropdown.open{display:flex;}
.ms-search{padding:8px 10px;border-bottom:1px solid var(--border2);}
.ms-search input{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);
  border-radius:6px;padding:5px 8px;font-size:.78em;outline:none;font-family:'DM Sans',sans-serif;}
.ms-search input:focus{border-color:var(--accent);}
.ms-actions{display:flex;gap:6px;padding:6px 10px;border-bottom:1px solid var(--border2);}
.ms-actions button{flex:1;background:var(--bg3);border:1px solid var(--border2);color:var(--muted);
  border-radius:5px;padding:3px 0;font-size:.7em;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;}
.ms-actions button:hover{border-color:var(--accent);color:var(--accent);}
.ms-list{overflow-y:auto;max-height:220px;padding:4px 0;}
.ms-item{display:flex;align-items:center;gap:8px;padding:6px 12px;cursor:pointer;transition:background .1s;font-size:.82em;}
.ms-item:hover{background:var(--bg3);}
.ms-item input[type=checkbox]{accent-color:var(--accent);width:13px;height:13px;cursor:pointer;flex-shrink:0;}
.ms-item span{color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* Tags */
.active-tags{display:flex;gap:5px;flex-wrap:wrap;padding:4px 24px 0;}
.tag{display:inline-flex;align-items:center;gap:4px;background:var(--accent-dim);color:var(--accent);
  border:1px solid rgba(0,229,176,.2);border-radius:20px;font-size:.7em;padding:2px 8px;cursor:pointer;
  font-family:'DM Mono',monospace;transition:all .15s;}
.tag:hover{background:rgba(255,77,109,.15);color:var(--danger);border-color:rgba(255,77,109,.3);}

.btn-clear{background:transparent;border:1px solid var(--muted2);color:var(--muted);
  border-radius:8px;padding:7px 12px;font-size:.78em;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;}
.btn-clear:hover{border-color:var(--danger);color:var(--danger);}

/* Fechas */
.date-input{background:var(--bg3);border:1px solid var(--border2);color:var(--text);
  border-radius:8px;padding:7px 10px;font-family:'DM Sans',sans-serif;font-size:.82em;outline:none;
  transition:border-color .2s;min-width:125px;}
.date-input:focus{border-color:var(--accent);}
.date-sep{color:var(--muted);font-size:.8em;}

/* ── TABLA ── */
.table-container{padding:12px 24px 32px;overflow-x:auto;}
.results-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;font-size:.78em;color:var(--muted);}
.results-count strong{color:var(--accent);font-family:'DM Mono',monospace;}
.page-size-sel{background:var(--bg3);border:1px solid var(--border2);color:var(--text);
  border-radius:6px;padding:4px 8px;font-size:.75em;outline:none;cursor:pointer;}

table{width:100%;border-collapse:separate;border-spacing:0;}
thead th{background:var(--bg3);font-family:'Syne',sans-serif;font-weight:600;font-size:.72em;
  text-transform:uppercase;letter-spacing:.8px;color:var(--muted);padding:10px 14px;
  border-bottom:2px solid var(--border2);white-space:nowrap;cursor:pointer;user-select:none;
  position:sticky;top:0;transition:color .2s;}
thead th:hover{color:var(--accent);}
thead th.sorted-asc::after{content:' ▲';color:var(--accent);font-size:.8em;}
thead th.sorted-desc::after{content:' ▼';color:var(--accent);font-size:.8em;}
tbody tr{transition:background .15s;cursor:default;}
tbody tr:hover{background:rgba(255,255,255,.025);}
tbody tr.expanded{background:var(--bg3);}
tbody td{padding:10px 14px;font-size:.82em;color:var(--text);vertical-align:top;border-bottom:1px solid var(--border);}
tbody tr:first-child td{padding-top:14px;}

.td-vhlo{font-family:'DM Mono',monospace;font-weight:500;color:var(--accent);font-size:.9em;white-space:nowrap;}
.td-familia{font-size:.72em;background:var(--bg4);border:1px solid var(--border2);border-radius:4px;padding:2px 7px;white-space:nowrap;display:inline-block;}
.td-averia{font-size:.75em;font-weight:600;color:var(--accent2);white-space:nowrap;}
.td-date{font-family:'DM Mono',monospace;font-size:.75em;color:var(--muted);white-space:nowrap;}
.td-turno{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;font-size:.7em;font-weight:700;font-family:'DM Mono',monospace;}
.td-turno.M{background:rgba(251,191,36,.15);color:#fbbf24;}
.td-turno.T{background:rgba(96,165,250,.15);color:#60a5fa;}
.td-turno.N{background:rgba(167,139,250,.15);color:#a78bfa;}
.td-truncate{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:.8em;color:rgba(240,240,255,.7);}

.row-detail{background:var(--bg3);}
.row-detail td{padding:0;}
.detail-inner{padding:16px 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;border-top:1px solid var(--border2);}
.detail-field{display:flex;flex-direction:column;gap:3px;}
.detail-label{font-size:.65em;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-family:'Syne',sans-serif;}
.detail-val{font-size:.82em;color:var(--text);}

.pagination{display:flex;align-items:center;justify-content:center;gap:6px;padding:20px 24px;flex-wrap:wrap;}
.page-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--muted);
  font-size:.8em;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;}
.page-btn:hover{border-color:var(--accent);color:var(--accent);}
.page-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:700;}
.page-btn:disabled{opacity:.3;cursor:not-allowed;}
.page-info{font-size:.75em;color:var(--muted);font-family:'DM Mono',monospace;padding:0 8px;}

.empty{text-align:center;padding:60px 24px;color:var(--muted);}
.empty-icon{font-size:3em;margin-bottom:12px;display:block;opacity:.4;}

.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:16px;color:var(--muted);font-size:.85em;}
.loader-ring{width:40px;height:40px;border-radius:50%;border:3px solid var(--border2);border-top-color:var(--accent);animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

@media(max-width:768px){
  .topbar{padding:0 16px;}
  .topbar-title{display:none;}
  .filtros-wrap,.active-tags{padding-left:16px;padding-right:16px;}
  .table-container{padding:12px 16px 24px;}
  .hide-mobile{display:none!important;}
  thead th{font-size:.65em;padding:8px 10px;}
  tbody td{padding:8px 10px;font-size:.75em;}
}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--accent);}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="topbar-logo">⚡ CT</a>
  <span class="topbar-sep">›</span>
  <span class="topbar-title">Incidencias</span>
  <div class="topbar-right">
    <span class="chip" id="chipTotal">Cargando...</span>
    <a href="index.html" class="btn-nav">← Dashboard</a>
  </div>
</div>

<div class="filtros-wrap">
  <div class="filtros-row">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="busqueda" placeholder="Buscar vehículo, descripción...">
    </div>
    <!-- Multi-selects generados por JS -->
    <div id="ms-container" style="display:flex;gap:8px;flex-wrap:wrap;"></div>
    <span class="date-sep">Desde</span>
    <input type="date" id="filtFechaIni" class="date-input">
    <span class="date-sep">hasta</span>
    <input type="date" id="filtFechaFin" class="date-input">
    <button class="btn-clear" onclick="limpiarFiltros()">✕ Limpiar</button>
  </div>
</div>
<div class="active-tags" id="activeTags"></div>

<div class="table-container">
  <div class="results-bar">
    <span class="results-count" id="resultsCount"></span>
    <select class="page-size-sel" id="pageSize" onchange="cambiarPagSize()">
      <option value="25">25 / pág</option>
      <option value="50">50 / pág</option>
      <option value="100">100 / pág</option>
      <option value="200">200 / pág</option>
    </select>
  </div>
  <div id="tableWrap">
    <div class="loader"><div class="loader-ring"></div>Cargando datos...</div>
  </div>
</div>
<div class="pagination" id="pagination"></div>

<script>
// ── Columnas tabla ──
const COLS = [
  {key:'FECHA AVISO',   label:'Fecha',        render: r=>`<span class="td-date">${r['FECHA AVISO']||'—'}</span>`},
  {key:'VHLO',          label:'Vehículo',      render: r=>`<span class="td-vhlo">${r['VHLO']||'—'}</span>`},
  {key:'FAMILIA',       label:'Familia',       render: r=>`<span class="td-familia">${r['FAMILIA']||'—'}</span>`},
  {key:'FAMILIA AVERIA',label:'Avería',        render: r=>`<span class="td-averia">${r['FAMILIA AVERIA']||'—'}</span>`},
  {key:'_desc',         label:'Descripción',   render: r=>{const v=r._desc||'';return `<span class="td-truncate" title="${v}">${v||'—'}</span>`;}},
  {key:'DEFICIENCIAS DETECTADAS', label:'Deficiencias', cls:'hide-mobile',
    render: r=>{const v=r['DEFICIENCIAS DETECTADAS']||'';return `<span class="td-truncate" title="${v}">${v||'—'}</span>`;}},
  {key:'TURNO',         label:'Turno',         render: r=>{const t=r['TURNO']||'';return `<span class="td-turno ${t}">${t||'—'}</span>`;}},
  {key:'ORIGEN AVISO',  label:'Origen',        cls:'hide-mobile', render: r=>`<span style="font-size:.78em">${r['ORIGEN AVISO']||'—'}</span>`},
  {key:'TIPO ORDEN',    label:'Orden',         cls:'hide-mobile', render: r=>`<span style="font-size:.75em;color:var(--muted)">${r['TIPO ORDEN']||'—'}</span>`},
];

// ── Definición de filtros multi-select ──
const FILTROS_DEF = [
  {id:'filtFamilia',  campo:'FAMILIA',        label:'Familia'},
  {id:'filtAveria',   campo:'FAMILIA AVERIA', label:'Avería'},
  {id:'filtTurno',    campo:'TURNO',          label:'Turno'},
  {id:'filtOrigen',   campo:'ORIGEN AVISO',   label:'Origen'},
  {id:'filtOrden',    campo:'TIPO ORDEN',     label:'Tipo Orden'},
  {id:'filtVhlo',     campo:'VHLO',           label:'Vehículo'},
];

// ── Estado ──
let datos=[], filtrados=[], pag=1, pagSize=25, sortKey='FECHA AVISO', sortDir=-1, expandedRow=null;
const seleccionados = {}; // {filtId: Set}
FILTROS_DEF.forEach(f => seleccionados[f.id] = new Set());

// ── Helpers ──
function norm(s){ return (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase(); }
function getDesc(row){
  for(const k of Object.keys(row)){
    const kn=norm(k).replace(/[^A-Z ]/g,'').trim();
    if(kn==='DESCRIPCION AVERIA'||kn==='DESCRIPCION') return (row[k]||'').toString().trim();
  }
  return '';
}
function getAviso(row){
  for(const k of Object.keys(row)){
    if(norm(k).replace(/[^A-Z0-9 ]/g,'').trim()==='N AVISO') return (row[k]||'').toString().trim();
  }
  return '';
}
function parseFecha(s){
  if(!s) return null;
  const p=s.split('/');
  if(p.length===3) return new Date(p[2],p[1]-1,p[0]);
  return new Date(s);
}
function fmtDateInput(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

// ── Multi-select widget ──
function crearMultiSelect(def) {
  const wrap = document.createElement('div');
  wrap.className = 'ms-wrap';
  wrap.id = 'wrap-' + def.id;

  const btn = document.createElement('div');
  btn.className = 'ms-btn';
  btn.id = 'btn-' + def.id;
  btn.innerHTML = `<span class="ms-btn-label">${def.label}</span><span class="ms-btn-arrow">▾</span>`;
  wrap.appendChild(btn);

  const drop = document.createElement('div');
  drop.className = 'ms-dropdown';
  drop.id = 'drop-' + def.id;
  drop.innerHTML = `
    <div class="ms-search"><input type="text" placeholder="Buscar..." id="search-${def.id}"></div>
    <div class="ms-actions">
      <button onclick="selTodo('${def.id}')">✓ Todos</button>
      <button onclick="selNinguno('${def.id}')">✗ Ninguno</button>
    </div>
    <div class="ms-list" id="list-${def.id}"></div>`;
  document.body.appendChild(drop);

  btn.addEventListener('click', e => {
    e.stopPropagation();
    const isOpen = drop.classList.contains('open');
    cerrarTodosDropdowns();
    if (!isOpen) {
      drop.classList.add('open');
      btn.classList.add('open');
      posicionarDropdown(btn, drop);
      document.getElementById('search-' + def.id).focus();
    }
  });

  document.getElementById('search-' + def.id).addEventListener('input', e => {
    filtrarLista(def.id, e.target.value);
  });

  wrap.appendChild(btn);
  return wrap;
}

function posicionarDropdown(btn, drop) {
  const r = btn.getBoundingClientRect();
  drop.style.top = (r.bottom + 4) + 'px';
  drop.style.left = r.left + 'px';
  // Evitar salida por la derecha
  requestAnimationFrame(() => {
    const dw = drop.offsetWidth;
    if (r.left + dw > window.innerWidth - 8) {
      drop.style.left = Math.max(8, window.innerWidth - dw - 8) + 'px';
    }
  });
}

function cerrarTodosDropdowns() {
  document.querySelectorAll('.ms-dropdown.open').forEach(d => d.classList.remove('open'));
  document.querySelectorAll('.ms-btn.open').forEach(b => b.classList.remove('open'));
}

document.addEventListener('click', e => {
  if (!e.target.closest('.ms-wrap') && !e.target.closest('.ms-dropdown')) cerrarTodosDropdowns();
});
window.addEventListener('scroll', () => {
  document.querySelectorAll('.ms-dropdown.open').forEach(drop => {
    const id = drop.id.replace('drop-','');
    const btn = document.getElementById('btn-' + id);
    if (btn) posicionarDropdown(btn, drop);
  });
}, true);

function poblarDropdown(filtId, valores) {
  const lista = document.getElementById('list-' + filtId);
  lista.innerHTML = valores.map(v => `
    <label class="ms-item">
      <input type="checkbox" value="${v}" ${seleccionados[filtId].has(v)?'checked':''} onchange="toggleVal('${filtId}','${v.replace(/'/g,"\\'")}',this.checked)">
      <span title="${v}">${v}</span>
    </label>`).join('');
}

function filtrarLista(filtId, q) {
  const nq = norm(q);
  document.querySelectorAll(`#list-${filtId} .ms-item`).forEach(item => {
    const v = norm(item.querySelector('span').textContent);
    item.style.display = v.includes(nq) ? '' : 'none';
  });
}

function toggleVal(filtId, val, checked) {
  if (checked) seleccionados[filtId].add(val);
  else seleccionados[filtId].delete(val);
  actualizarBtn(filtId);
  aplicarFiltros();
}

function selTodo(filtId) {
  document.querySelectorAll(`#list-${filtId} input`).forEach(cb => {
    if (cb.offsetParent !== null) { cb.checked = true; seleccionados[filtId].add(cb.value); }
  });
  actualizarBtn(filtId); aplicarFiltros();
}

function selNinguno(filtId) {
  document.querySelectorAll(`#list-${filtId} input`).forEach(cb => {
    cb.checked = false;
  });
  seleccionados[filtId].clear();
  actualizarBtn(filtId); aplicarFiltros();
}

function actualizarBtn(filtId) {
  const def = FILTROS_DEF.find(f => f.id === filtId);
  const n = seleccionados[filtId].size;
  const btn = document.getElementById('btn-' + filtId);
  if (n === 0) {
    btn.innerHTML = `<span class="ms-btn-label">${def.label}</span><span class="ms-btn-arrow">▾</span>`;
  } else {
    const labels = [...seleccionados[filtId]].slice(0, 2).join(', ') + (n > 2 ? '...' : '');
    btn.innerHTML = `<span class="ms-btn-label">${labels}</span><span class="ms-count">${n}</span><span class="ms-btn-arrow">▾</span>`;
  }
}

// ── Cargar JSON ──
fetch('resumen_full.json')
  .then(r => r.json())
  .then(data => {
    const NK = ['FAMILIA','VHLO','FAMILIA AVERIA','ORIGEN AVISO','TURNO','TIPO ORDEN'];
    data.forEach(d => {
      NK.forEach(k => { if(d[k]) d[k] = d[k].toString().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase(); });
      d._fecha = parseFecha(d['FECHA AVISO']);
      d._desc  = getDesc(d);
      d._aviso = getAviso(d);
    });
    datos = data.filter(d => d['VHLO'] && d['VHLO'].trim() !== '');

    // Crear widgets multi-select
    const cont = document.getElementById('ms-container');
    FILTROS_DEF.forEach(def => {
      const vals = [...new Set(datos.map(d => d[def.campo]).filter(Boolean))].sort();
      cont.appendChild(crearMultiSelect(def));
      poblarDropdown(def.id, vals);
    });

    // Fechas
    const fechas = datos.filter(d => d._fecha).map(d => d._fecha);
    if (fechas.length) {
      document.getElementById('filtFechaIni').value = fmtDateInput(new Date(Math.min(...fechas)));
      document.getElementById('filtFechaFin').value = fmtDateInput(new Date(Math.max(...fechas)));
    }

    aplicarFiltros();
  })
  .catch(() => {
    document.getElementById('tableWrap').innerHTML = '<div class="empty"><span class="empty-icon">⚠️</span>No se pudo cargar resumen_full.json</div>';
  });

// ── Filtrar ──
function aplicarFiltros() {
  const busq    = norm(document.getElementById('busqueda').value);
  const fechaIni = document.getElementById('filtFechaIni').valueAsDate;
  const fechaFin = document.getElementById('filtFechaFin').valueAsDate;

  filtrados = datos.filter(d => {
    // Fechas
    if (fechaIni && d._fecha && d._fecha < fechaIni) return false;
    if (fechaFin && d._fecha && d._fecha > fechaFin) return false;
    // Multi-selects
    for (const def of FILTROS_DEF) {
      const sel = seleccionados[def.id];
      if (sel.size > 0 && !sel.has(d[def.campo])) return false;
    }
    // Búsqueda
    if (busq) {
      const h = norm(`${d['VHLO']} ${d._desc} ${d['DEFICIENCIAS DETECTADAS']} ${d['FAMILIA AVERIA']} ${d._aviso}`);
      if (!h.includes(busq)) return false;
    }
    return true;
  });

  filtrados.sort((a, b) => {
    let va = a[sortKey]||'', vb = b[sortKey]||'';
    if (sortKey === 'FECHA AVISO') { va = a._fecha||new Date(0); vb = b._fecha||new Date(0); }
    if (sortKey === '_desc') { va = a._desc||''; vb = b._desc||''; }
    if (va < vb) return -sortDir; if (va > vb) return sortDir; return 0;
  });

  pag = 1;
  renderTabla();
  renderTags();
  document.getElementById('chipTotal').textContent = `${filtrados.length.toLocaleString()} incidencias`;
}

// ── Render tabla ──
function renderTabla() {
  const wrap = document.getElementById('tableWrap');
  const inicio = (pag-1)*pagSize, fin = inicio+pagSize;
  const pagData = filtrados.slice(inicio, fin);

  document.getElementById('resultsCount').innerHTML =
    `<strong>${filtrados.length.toLocaleString()}</strong> resultados${filtrados.length!==datos.length?' de '+datos.length.toLocaleString()+' total':''}`;

  if (!filtrados.length) {
    wrap.innerHTML = '<div class="empty"><span class="empty-icon">🔍</span>Sin resultados</div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  let html = `<table><thead><tr>`;
  COLS.forEach(col => {
    const s = sortKey===col.key ? (sortDir===1?'sorted-asc':'sorted-desc') : '';
    html += `<th class="${s} ${col.cls||''}" onclick="ordenarPor('${col.key}')">${col.label}</th>`;
  });
  html += `<th style="width:30px;"></th></tr></thead><tbody>`;

  pagData.forEach((row, i) => {
    const idx = inicio + i;
    html += `<tr onclick="toggleDetalle(${idx})" class="${expandedRow===idx?'expanded':''}">`;
    COLS.forEach(col => { html += `<td class="${col.cls||''}">${col.render(row)}</td>`; });
    html += `<td style="color:var(--muted);font-size:.8em;text-align:center;">${expandedRow===idx?'▲':'▼'}</td></tr>`;

    if (expandedRow === idx) {
      html += `<tr class="row-detail"><td colspan="${COLS.length+1}"><div class="detail-inner">`;
      [['Nº Aviso',row._aviso],['Conductor',row['CONDUCTOR']],['Hora',row['HORA']],
       ['Aviso antiguo',row['AVISO ANTIGUO?']],['Foto',row['FOTO']],
       ['Descripción',row._desc],['Deficiencias',row['DEFICIENCIAS DETECTADAS']],
       ['Tipo orden',row['TIPO ORDEN']],['Origen',row['ORIGEN AVISO']]
      ].forEach(([l,v]) => {
        if (v && v.toString().trim())
          html += `<div class="detail-field"><span class="detail-label">${l}</span><span class="detail-val">${v}</span></div>`;
      });
      html += `</div></td></tr>`;
    }
  });

  html += `</tbody></table>`;
  wrap.innerHTML = html;
  renderPaginacion();
}

function toggleDetalle(idx) { expandedRow = expandedRow===idx ? null : idx; renderTabla(); }
function ordenarPor(key) { if(sortKey===key) sortDir*=-1; else {sortKey=key;sortDir=1;} aplicarFiltros(); }

// ── Paginación ──
function renderPaginacion() {
  const total = Math.ceil(filtrados.length/pagSize);
  if (total <= 1) { document.getElementById('pagination').innerHTML=''; return; }
  let html = `<button class="page-btn" onclick="irPag(${pag-1})" ${pag===1?'disabled':''}>‹</button>`;
  const r=[];
  r.push(1);
  if(pag>3) r.push('…');
  for(let p=Math.max(2,pag-1);p<=Math.min(total-1,pag+1);p++) r.push(p);
  if(pag<total-2) r.push('…');
  if(total>1) r.push(total);
  r.forEach(p => {
    if(p==='…') html+=`<span class="page-info">…</span>`;
    else html+=`<button class="page-btn ${p===pag?'active':''}" onclick="irPag(${p})">${p}</button>`;
  });
  html+=`<button class="page-btn" onclick="irPag(${pag+1})" ${pag===total?'disabled':''}>›</button>`;
  html+=`<span class="page-info">Pág ${pag}/${total}</span>`;
  document.getElementById('pagination').innerHTML = html;
}

function irPag(p) {
  const max=Math.ceil(filtrados.length/pagSize);
  if(p<1||p>max) return;
  pag=p; expandedRow=null; renderTabla();
  window.scrollTo({top:0,behavior:'smooth'});
}
function cambiarPagSize() { pagSize=parseInt(document.getElementById('pageSize').value); pag=1; renderTabla(); }

// ── Tags ──
function renderTags() {
  const cont = document.getElementById('activeTags');
  cont.innerHTML = '';
  FILTROS_DEF.forEach(def => {
    seleccionados[def.id].forEach(val => {
      const tag = document.createElement('span');
      tag.className = 'tag';
      tag.textContent = `${def.label}: ${val} ✕`;
      tag.onclick = () => {
        seleccionados[def.id].delete(val);
        const cb = document.querySelector(`#list-${def.id} input[value="${CSS.escape(val)}"]`);
        if (cb) cb.checked = false;
        actualizarBtn(def.id);
        aplicarFiltros();
      };
      cont.appendChild(tag);
    });
  });
  if (document.getElementById('busqueda').value) {
    const tag = document.createElement('span');
    tag.className = 'tag';
    tag.textContent = `"${document.getElementById('busqueda').value}" ✕`;
    tag.onclick = () => { document.getElementById('busqueda').value=''; aplicarFiltros(); };
    cont.appendChild(tag);
  }
}

// ── Limpiar ──
function limpiarFiltros() {
  FILTROS_DEF.forEach(def => {
    seleccionados[def.id].clear();
    document.querySelectorAll(`#list-${def.id} input`).forEach(cb => cb.checked = false);
    actualizarBtn(def.id);
  });
  document.getElementById('busqueda').value = '';
  const fechas = datos.filter(d=>d._fecha).map(d=>d._fecha);
  if (fechas.length) {
    document.getElementById('filtFechaIni').value = fmtDateInput(new Date(Math.min(...fechas)));
    document.getElementById('filtFechaFin').value = fmtDateInput(new Date(Math.max(...fechas)));
  }
  aplicarFiltros();
}

document.getElementById('busqueda').addEventListener('input', aplicarFiltros);

// Calcular offset del header sticky dinámicamente
function ajustarStickyHeader() {
  const topbar = document.querySelector('.topbar');
  const filtros = document.querySelector('.filtros-wrap');
  const tags = document.querySelector('.active-tags');
  const offset = (topbar ? topbar.offsetHeight : 0)
               + (filtros ? filtros.offsetHeight : 0)
               + (tags && tags.children.length ? tags.offsetHeight + 4 : 0);
  document.querySelectorAll('thead th').forEach(th => th.style.top = offset + 'px');
}
// Llamar después de render y al hacer scroll/resize
const _renderTablaOrig = renderTabla;
function renderTabla() { _renderTablaOrig(); setTimeout(ajustarStickyHeader, 0); }
window.addEventListener('resize', ajustarStickyHeader);
document.getElementById('filtFechaIni').addEventListener('input', aplicarFiltros);
document.getElementById('filtFechaFin').addEventListener('input', aplicarFiltros);
</script>
</body>
